<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端测试连接</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .test-section {
            margin-bottom: 30px;
        }
        
        .test-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .test-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
        }
        
        .test-status.loading {
            background: #ffa500;
            animation: pulse 1s infinite;
        }
        
        .test-status.success {
            background: #4caf50;
        }
        
        .test-status.error {
            background: #f44336;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .test-result {
            background: #f5f5f5;
            border-left: 4px solid #ccc;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #666;
            font-family: 'Monaco', 'Courier New', monospace;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .test-result.success {
            border-left-color: #4caf50;
            background: #f1f8f4;
            color: #2e7d32;
        }
        
        .test-result.error {
            border-left-color: #f44336;
            background: #fef5f5;
            color: #c62828;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #1565c0;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 前端测试连接</h1>
        
        <div class="info-box">
            💡 这个页面用来测试前端与后端的连接。点击下面的按钮进行测试。
        </div>
        
        <!-- 后端健康检查 -->
        <div class="test-section">
            <div class="test-title">
                <span class="test-status" id="health-status"></span>
                后端健康检查
            </div>
            <div class="test-result" id="health-result">等待测试...</div>
        </div>
        
        <!-- 登录测试 -->
        <div class="test-section">
            <div class="test-title">
                <span class="test-status" id="login-status"></span>
                登录测试
            </div>
            <div style="margin-bottom: 12px;">
                <input type="text" id="username" placeholder="用户名" style="width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 4px;">
                <input type="password" id="password" placeholder="密码" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div class="test-result" id="login-result">等待测试...</div>
        </div>
        
        <!-- 代理测试 -->
        <div class="test-section">
            <div class="test-title">
                <span class="test-status" id="proxy-status"></span>
                代理测试
            </div>
            <div class="test-result" id="proxy-result">等待测试...</div>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="runAllTests()">运行所有测试</button>
            <button class="btn-secondary" onclick="clearResults()">清除结果</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = getApiBaseUrl();
        
        function getApiBaseUrl() {
            // 获取当前 URL
            const currentUrl = window.location.origin;
            console.log('Current URL:', currentUrl);
            
            // 将 8081 端口替换为 3000 端口
            let apiUrl = currentUrl;
            if (apiUrl.includes("://8081-")) {
                apiUrl = apiUrl.replace("://8081-", "://3000-");
            } else if (apiUrl.endsWith(":8081")) {
                apiUrl = apiUrl.replace(":8081", ":3000");
            } else if (apiUrl.includes(":8081/")) {
                apiUrl = apiUrl.replace(":8081/", ":3000/");
            }
            
            console.log('API Base URL:', apiUrl);
            return apiUrl;
        }
        
        function setStatus(elementId, status) {
            const el = document.getElementById(elementId);
            el.className = 'test-status ' + status;
        }
        
        function setResult(elementId, text, isSuccess) {
            const el = document.getElementById(elementId);
            el.textContent = text;
            el.className = 'test-result ' + (isSuccess ? 'success' : 'error');
        }
        
        async function testHealth() {
            setStatus('health-status', 'loading');
            setResult('health-result', '测试中...');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/health`);
                const data = await response.json();
                
                setStatus('health-status', 'success');
                setResult('health-result', `✅ 后端正常\n${JSON.stringify(data, null, 2)}`, true);
            } catch (error) {
                setStatus('health-status', 'error');
                setResult('health-result', `❌ 错误: ${error.message}`, false);
            }
        }
        
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                setResult('login-result', '❌ 请输入用户名和密码', false);
                return;
            }
            
            setStatus('login-status', 'loading');
            setResult('login-result', '测试中...');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/proxy/api/trpc/auth.loginWithUserAccount`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ json: { username, password } }),
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    const result = data?.result?.data?.json;
                    if (result?.success) {
                        setStatus('login-status', 'success');
                        setResult('login-result', `✅ 登录成功\n用户: ${result.user.name}\nToken: ${result.token.substring(0, 50)}...`, true);
                    } else {
                        setStatus('login-status', 'error');
                        setResult('login-result', `❌ 登录失败\n${result?.message || '未知错误'}`, false);
                    }
                } else {
                    setStatus('login-status', 'error');
                    setResult('login-result', `❌ HTTP ${response.status}\n${JSON.stringify(data, null, 2)}`, false);
                }
            } catch (error) {
                setStatus('login-status', 'error');
                setResult('login-result', `❌ 错误: ${error.message}`, false);
            }
        }
        
        async function testProxy() {
            setStatus('proxy-status', 'loading');
            setResult('proxy-result', '测试中...');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/proxy/api/health`);
                const data = await response.json();
                
                setStatus('proxy-status', 'success');
                setResult('proxy-result', `✅ 代理正常\n${JSON.stringify(data, null, 2)}`, true);
            } catch (error) {
                setStatus('proxy-status', 'error');
                setResult('proxy-result', `❌ 错误: ${error.message}`, false);
            }
        }
        
        async function runAllTests() {
            await testHealth();
            await new Promise(r => setTimeout(r, 500));
            await testProxy();
            await new Promise(r => setTimeout(r, 500));
            await testLogin();
        }
        
        function clearResults() {
            document.getElementById('health-status').className = 'test-status';
            document.getElementById('login-status').className = 'test-status';
            document.getElementById('proxy-status').className = 'test-status';
            
            document.getElementById('health-result').textContent = '等待测试...';
            document.getElementById('login-result').textContent = '等待测试...';
            document.getElementById('proxy-result').textContent = '等待测试...';
        }
        
        // 页面加载时显示 API 地址
        window.addEventListener('load', () => {
            console.log('API Base URL:', API_BASE_URL);
        });
    </script>
</body>
</html>
